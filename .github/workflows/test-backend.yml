name: Test Backend

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # .env.example has empty secrets — fill them in for CI.
      # These values are non-sensitive test credentials, not production secrets.
      - name: Create .env for tests
        run: |
          cp .env.example .env
          sed -i "s|^APP_KEY=.*|APP_KEY=$(python3 -c 'import secrets; print(secrets.token_urlsafe(32))')|" .env
          sed -i "s|^DB_PASSWORD=.*|DB_PASSWORD=ci-db-password|" .env
          sed -i "s|^DB_ROOT_PASSWORD=.*|DB_ROOT_PASSWORD=ci-root-password|" .env
          sed -i "s|^JWT_SECRET_KEY=.*|JWT_SECRET_KEY=$(python3 -c 'import secrets; print(secrets.token_urlsafe(32))')|" .env
          sed -i "s|^FIRST_SUPERUSER_PASSWORD=.*|FIRST_SUPERUSER_PASSWORD=ci-superuser-pass|" .env

      - name: Run backend tests
        run: make test-be

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-html-${{ github.sha }}
          path: backend/htmlcov
          include-hidden-files: true
